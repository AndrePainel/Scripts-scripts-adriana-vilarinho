<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#3d6158;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem}
.app{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 3rem);width:100%;max-width:1100px;border-radius:14px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.25)}
.sidebar{background:#4a7a6d;display:flex;flex-direction:column}
.sb-header{padding:1.1rem 1rem .9rem;border-bottom:1px solid rgba(255,255,255,0.12);flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:.85rem}
.sb-icon{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}
.sb-clinic{color:#fff;font-size:13px;font-weight:600;line-height:1.3}
.sb-clinic span{display:block;color:rgba(255,255,255,0.55);font-size:11px;font-weight:400;margin-top:1px}
.sb-search{position:relative}
.sb-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:rgba(255,255,255,0.45);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.sb-search input{width:100%;padding:7px 9px 7px 30px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;font-size:13px}
.sb-search input::placeholder{color:rgba(255,255,255,0.4)}
.sb-search input:focus{outline:none;background:rgba(255,255,255,0.15)}
.sb-cats{flex:1;overflow-y:auto;padding:.5rem .5rem .75rem}
.sb-cats::-webkit-scrollbar{width:3px}
.sb-cats::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}
.cat-group{margin-bottom:.2rem}
.cat-title{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.8px;padding:.55rem .5rem .25rem;font-weight:600}
.proc-btn{width:100%;text-align:left;padding:7px 9px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;line-height:1.3;transition:background .12s}
.proc-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.proc-btn.active{background:rgba(255,255,255,0.2);color:#fff;font-weight:600}
.proc-btn .ph{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-top:1px}
.main{background:#5f8a7e;display:flex;flex-direction:column}
.main-topbar{padding:.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-title{color:#fff;font-size:15px;font-weight:600}
.main-sub{color:rgba(255,255,255,0.55);font-size:12px;margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:.9rem 1.2rem .75rem;flex-shrink:0}
.stat-card{background:rgba(255,255,255,0.1);border-radius:9px;padding:.65rem .9rem;border:1px solid rgba(255,255,255,0.08)}
.stat-n{font-size:22px;font-weight:700;color:#fff}
.stat-l{font-size:11px;color:rgba(255,255,255,0.55);margin-top:1px}
.content-area{flex:1;padding:0 1.2rem 1.2rem;display:flex;flex-direction:column;gap:.75rem;overflow-y:auto}
.content-area::-webkit-scrollbar{width:4px}
.content-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}
.empty-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,0.35);font-size:14px;padding:3rem;text-align:center;min-height:300px}
.empty-icon{font-size:42px;opacity:.4}
.script-wrap{background:rgba(255,255,255,0.08);border-radius:11px;border:1px solid rgba(255,255,255,0.12);overflow:hidden}
.script-top{padding:.85rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.1)}
.st-name{color:#fff;font-size:14px;font-weight:600}
.st-cat{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.st-actions{display:flex;gap:6px;flex-shrink:0;margin-left:10px;align-items:center}
.act-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.22);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);font-size:12px;cursor:pointer;transition:background .12s}
.act-btn:hover{background:rgba(255,255,255,0.18)}
.act-btn.copied{background:rgba(255,255,255,0.22);color:#fff}
.tipo-pills{display:flex;gap:6px;flex-wrap:wrap;padding:.6rem 1rem .5rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.tipo-pill{padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;transition:all .12s}
.tipo-pill:hover{color:#fff;border-color:rgba(255,255,255,0.35)}
.tipo-pill.on{background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.4);font-weight:600}
.script-body{padding:1rem 1.1rem}
.script-txt{font-size:14px;line-height:1.9;color:rgba(255,255,255,0.92);white-space:pre-wrap}
.atd-row{display:flex;align-items:center;gap:8px;padding:.55rem 1rem .5rem;border-top:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.07)}
.atd-row span{font-size:12px;color:rgba(255,255,255,0.45)}
.atd-row input{padding:5px 9px;border:1px solid rgba(255,255,255,0.18);border-radius:6px;background:rgba(255,255,255,0.08);color:#fff;font-size:12px;width:120px}
.atd-row input::placeholder{color:rgba(255,255,255,0.35)}
.atd-row input:focus{outline:none;background:rgba(255,255,255,0.14)}
.atd-apply{padding:5px 12px;border:1px solid rgba(255,255,255,0.22);border-radius:6px;background:transparent;color:rgba(255,255,255,0.75);font-size:12px;cursor:pointer;transition:all .12s}
.atd-apply:hover{background:rgba(255,255,255,0.1);color:#fff}

@media(max-width:700px){
  body{padding:.5rem}
  .app{grid-template-columns:1fr;min-height:auto}
  .sidebar{max-height:260px}
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .stat-n{font-size:18px}
}
</style>

limpezapele:{n:'Limpeza de pele',c:'estetica',h:'Extração, LED, vapor de ozônio',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Queria te contar um pouquinho sobre a nossa Limpeza de Pele aqui na Clínica Adriana Vilarinho!

É um procedimento completo, feito pela nossa equipe de estética, com duração de aproximadamente 1h30. Passamos por várias etapas pensadas para deixar sua pele limpa e com muito mais viço:

✔ Higienização e esfoliação
✔ Vapor de ozônio
✔ Extração de cravos e impurezas
✔ Alta frequência
✔ LED terapia
✔ Máscara facial e finalização

É ótima para controlar a oleosidade, desobstruir os poros e preparar a pele para absorver melhor outros tratamentos. Não tem contraindicações!

Posso te ajudar a agendar? Qualquer dúvida, estou aqui!

At, {atd} 🌷`,
'Agendamento':`Olá! Tudo bem? 😊

Passando para confirmar sua Limpeza de Pele aqui na clínica!

Para aproveitar melhor o procedimento, não é necessário nenhum preparo especial — venha com o rosto limpo e sem maquiagem.

A sessão dura cerca de 1h30, então separe um tempinho no seu dia para se cuidar! 🌿

Qualquer dúvida, estou à disposição. Até lá!

At, {atd} 🌷`,
'Pós-procedimento':`Olá! Como você está se sentindo? 😊

Passando para deixar as orientações pós Limpeza de Pele:

• A pele pode ficar um pouco avermelhada hoje — é completamente normal e passa em até 24 horas
• Evite maquiagem no dia do procedimento
• Use filtro solar diariamente — esse passo é essencial!
• Evite exposição solar intensa nos próximos dias

Qualquer dúvida ou se notar algo diferente, me chame! Estamos sempre por aqui.

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava verificando sua ficha aqui na clínica e vi que faz um tempinho que não nos vemos!

Que tal dar um up na sua pele com uma Limpeza de Pele? Ela é perfeita para dar aquele viço de volta e desobstruir os poros!

Posso verificar os horários disponíveis para você. É só me dizer qual dia fica melhor! 😊

At, {atd} 🌷`
}},
peelquimico:{n:'Peeling químico',c:'estetica',h:'Renovação celular, manchas, acne',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar sobre o Peeling Químico aqui na Clínica Adriana Vilarinho!

É um tratamento que usa ácidos específicos para promover a renovação celular da pele. É indicado para:

✔ Clarear manchas e marcas de expressão
✔ Controlar a acne e oleosidade
✔ Melhorar textura e luminosidade da pele
✔ Renovação celular geral

O procedimento é bem rápido — menos de 30 minutos — e pode ser feito mensalmente ou quinzenalmente. A substância usada é escolhida de acordo com o seu tipo de pele!

Quer saber mais ou agendar? Estou aqui! 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Peeling Químico aqui na clínica!

Orientações para o dia:
• Venha com o rosto limpo, sem maquiagem
• Se estiver usando ácidos em casa, suspenda 3 dias antes
• Não venha com a pele descamando ou irritada

O procedimento é rápido, menos de 30 minutos. Depois você já pode retomar sua rotina normalmente!

Qualquer dúvida estou por aqui. Te esperamos!

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

}},
beautygym:{n:'Beauty Gym',c:'estetica',h:'Ginástica facial, efeito cinderela',scripts:{

}},
hydrafacial:{n:'Hydrafacial',c:'facial',h:'Hidro dermoabrasão, todos os tipos de pele',scripts:{

aquapure:{n:'Aquapure (Classys)',c:'facial',h:'Limpeza + hidratação inteligente',scripts:{

spectra:{n:'Spectra (Lutronic)',c:'facial',h:'Manchas, melasma, acne',scripts:{

ultraformer:{n:'Ultraformer MPT (Classys)',c:'facial',h:'Ultrassom micro + macro focado, lifting',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Realizado pela equipe médica. A sessão dura cerca de 90 minutos.

Posso te ajudar a agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Ultraformer MPT aqui na clínica!

'Pós-procedimento':`Olá! 😊

}},
morpheus:{n:'Morpheus (InMode)',c:'facial',h:'RF micro agulhada, face e corpo',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

✔ Corpo: flacidez, celulite e estrias

}},
thermage:{n:'Thermage (Solta)',c:'facial',h:'RF monopolar, qualquer época do ano',scripts:{

Posso te ajudar a agendar? 😊

}},
ulthera:{n:'Ulthera (Merz)',c:'facial',h:'Ultrassom micro focado com visualização',scripts:{

}},
toxina:{n:'Toxina botulínica',c:'injetavel',h:'Botox, Dysport, Xeomin',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar um pouco sobre a Toxina Botulínica aqui na Clínica Adriana Vilarinho!

É um dos procedimentos mais realizados no mundo. A toxina relaxa temporariamente os músculos responsáveis pelas rugas de expressão, suavizando:

✔ Linhas da testa e entre as sobrancelhas
✔ Patas de galinha (ao redor dos olhos)
✔ Rugas do pescoço
✔ Excesso de suor (hiperidrose) nas axilas, mãos e pés

Trabalhamos com Dysport, Botox e Xeomin — a escolha é feita pela médica conforme o seu perfil.

O procedimento dura cerca de 30 minutos. Resultado com duração de 4 a 6 meses!

Posso te ajudar a agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando sua aplicação de Toxina Botulínica aqui na clínica!

Lembrando algumas orientações para o dia:
• Venha com o rosto limpo
• Evite anticoagulantes e álcool nos dias anteriores, se possível

Após o procedimento:
• Não deite por 3 horas
• Evite pressão na área tratada no dia da aplicação
• Em caso de hematoma, evite sol até sumir

O resultado aparece gradualmente em até 14 dias!

At, {atd} 🌷`,
'Pós-procedimento':`Olá! 😊

Orientações pós Toxina Botulínica:

• Não deite por pelo menos 3 horas após a aplicação
• Evite pressionar ou massagear a área tratada hoje
• Se aparecer hematoma, evite exposição solar até sumir
• O resultado começa a aparecer em 3 a 7 dias e atinge o pico em até 14 dias

Qualquer dúvida ou se notar algo incomum, me chame! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que já está no período ideal para reaplicar a Toxina Botulínica! O recomendado é de 4 a 6 meses entre as sessões para manter o resultado.

Que tal agendarmos? Posso verificar o melhor dia para você 😊

At, {atd} 🌷`
}},
bioestimulador:{n:'Bioestimulador de colágeno',c:'injetavel',h:'Radiesse, Sculptra, Eleva, HarmonyCa',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar os Bioestimuladores de Colágeno, um dos tratamentos que mais entregam resultados duradouros aqui na clínica!

Indicados para:
✔ Flacidez de rosto, pescoço e colo
✔ Flacidez corporal (braços, coxas, abdômen, glúteos, mãos)

O resultado é gradual e natural! Realizado pela equipe médica.

Posso te agendar uma avaliação? 😊

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Bioestimulador de Colágeno:

• Possível hematoma que some em até 10 dias

• Evite piscina, mar e sauna por 24 horas
• Maquiagem e filtro solar estão liberados

O resultado melhora progressivamente ao longo de 2 a 3 meses! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que já está chegando o período ideal para a próxima sessão de Bioestimulador! Manter a regularidade potencializa muito o resultado.

Que tal agendarmos? Me diga qual o melhor dia para você 😊

At, {atd} 🌷`
}},
preenchedorAH:{n:'Preenchedores AH',c:'injetavel',h:'Restylane, HarmonyCa, Sofiderm, UP',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Vou te contar sobre os nossos Preenchedores de Ácido Hialurônico aqui na Clínica Adriana Vilarinho!

O ácido hialurônico é uma substância natural do nosso corpo que vai sendo perdida com o tempo. Ao repormos, conseguimos:

✔ Suavizar sulcos e rugas profundas
✔ Volumizar lábios, maçãs do rosto e outras áreas

✔ Tratar olheiras com fundo de volume

Posso te agendar uma avaliação? 😊

• Para lábios: evite movimentos excessivos nas primeiras horas

Qualquer dúvida estou aqui! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que o preenchimento com ácido hialurônico vai sendo absorvido gradualmente pelo organismo — e manter o tratamento em dia garante a naturalidade e o volume que você gosta!

Que tal agendarmos uma avaliação com a médica? 😊

}},
profhilo:{n:'Profhilo (Ibsa)',c:'injetavel',h:'AH ultrapuro, firmeza sem volumizar',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

O resultado melhora nas semanas seguintes! 🌿

At, {atd} 🌷`,

}},
skinbooster:{n:'Skinbooster (Galderma)',c:'injetavel',h:'AH fluido, hidratação profunda',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar o Skinbooster — um tratamento injetável focado em hidratação profunda e qualidade de pele!

✔ Restylane Vital Light: para peles mais finas

Object.assign(S, FALTANDO);

function renderSidebar(){
  const q=document.getElementById('q').value.toLowerCase();
  const el=document.getElementById('sbCats');
  const groups={};
  Object.keys(S).filter(k=>!q||S[k].n.toLowerCase().includes(q)||S[k].h.toLowerCase().includes(q))
    .forEach(k=>{const c=S[k].c;if(!groups[c])groups[c]=[];groups[c].push(k);});
  if(!Object.keys(groups).length){
    el.innerHTML='<div style="color:rgba(255,255,255,0.4);font-size:13px;padding:1rem .5rem;text-align:center">Nenhum resultado encontrado</div>';
    return;
  }
  el.innerHTML=Object.entries(CAT).filter(([c])=>groups[c]).map(([c,label])=>`
    <div class="cat-group">
      <div class="cat-title">${label}</div>
      ${groups[c].map(k=>`
        <button class="proc-btn${k===activeId?' active':''}" onclick="select('${k}')">
          ${S[k].n}<span class="ph">${S[k].h}</span>
        </button>`).join('')}
    </div>`).join('');
}

function select(id){
  activeId=id;
  renderSidebar();
  showScript(id);
}

function showScript(id){
  const item=S[id];
  if(!item)return;
  document.getElementById('mainTitle').textContent=item.n;
  document.getElementById('mainSub').textContent=CAT[item.c]+' · script pronto';
  const atd=atendente;
  document.getElementById('contentArea').innerHTML=`
    <div class="tipo-pills">${TIPOS.filter(t=>item.scripts[t]).map(t=>`
      <span class="tipo-pill${t===tipoAtivo?' on':''}" onclick="setTipo('${t}','${id}')">${t}</span>`).join('')}</div>
    <div class="script-wrap">
      <div class="script-top">
        <div><div class="st-name">${item.n}</div><div class="st-cat">${CAT[item.c]} · ${tipoAtivo}</div></div>
        <div class="st-actions">
          <button class="act-btn" id="copyBtn" onclick="copiar('${id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar
          </button>
        </div>
      </div>
      <div class="script-body">
        <div class="script-txt" id="stxt">${esc(buildScript(id,atd))}</div>
      </div>
      <div class="atd-row">
        <span>Atendente:</span>
        <input id="atdInput" value="${atd}" placeholder="Ex: Joyce" oninput="atualizarAtd('${id}')">
        <button class="atd-apply" onclick="atualizarAtd('${id}')">Aplicar</button>
      </div>
    </div>`;
}

function buildScript(id,atd){
  const item=S[id];
  if(!item||!item.scripts[tipoAtivo])return'Script não disponível.';
  const a=atd||atendente;
  return item.scripts[tipoAtivo].replace(/\{atd\}/g,a);
}

function atualizarAtd(id){
  atendente=document.getElementById('atdInput').value||'Joyce';
  const el=document.getElementById('stxt');
  if(el)el.innerHTML=esc(buildScript(id,atendente));
}

function setTipo(t,id){
  tipoAtivo=t;
  showScript(id);
}

function copiar(id){
  const el=document.getElementById('stxt');
  if(!el)return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    copiados++;
    document.getElementById('stCopiados').textContent=copiados;
    const btn=document.getElementById('copyBtn');
    if(btn){
      btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Copiado!';
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar';
        btn.classList.remove('copied');
      },2000);
    }
  });
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
renderSidebar();
